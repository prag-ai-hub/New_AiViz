services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiviz
      POSTGRES_PASSWORD: aiviz
      POSTGRES_DB: aiviz
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["5433:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  web:
    build: { context: .., dockerfile: docker/Dockerfile }
    env_file: ../.env
    depends_on: [db, redis]
    ports: ["8000:8000"]
    volumes: ["..:/app"]

  worker:
    build: { context: .., dockerfile: docker/Dockerfile }
    env_file: ../.env
    depends_on: [db, redis]
    command: celery -A config worker -l info
    volumes: ["..:/app"]

  beat:
    build: { context: .., dockerfile: docker/Dockerfile }
    env_file: ../.env
    depends_on: [db, redis]
    command: celery -A config beat -l info
    volumes: ["..:/app"]

volumes:
  pgdata:
